<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Generator — DobroPost</title>
<style>
  /* Шрифт Inter загружается через FontFace API в JS */

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #0f1117;
    color: #e8eaf0;
    min-height: 100vh;
  }

  header {
    padding: 14px 24px;
    border-bottom: 1px solid #1e2130;
    display: flex;
    align-items: center;
    gap: 16px;
    background: #13161e;
  }

  header .logo { font-size: 18px; font-weight: 700; color: #ff9f43; }

  .tabs { display: flex; gap: 4px; margin-left: auto; }

  .tab {
    padding: 6px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: transparent;
    color: #6b7280;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active { background: #1e2130; color: #e8eaf0; }
  .tab:hover:not(.active) { color: #9ca3af; }

  .container {
    display: grid;
    grid-template-columns: 210px 1fr;
    height: calc(100vh - 53px);
  }

  .sidebar {
    background: #13161e;
    border-right: 1px solid #1e2130;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    color: #374151;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 4px 4px 6px;
  }

  .template-card {
    border-radius: 7px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
    position: relative;
  }
  .template-card:hover { border-color: #ff9f43; }
  .template-card.active { border-color: #ff9f43; box-shadow: 0 0 0 1px #ff9f43; }
  .template-card img { width: 100%; height: 54px; object-fit: cover; display: block; }
  .template-card .t-name {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.6);
    font-size: 9px; color: #fff;
    padding: 3px 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .editor {
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .canvas-wrap { display: flex; justify-content: center; }
  .canvas-wrap canvas {
    max-width: 100%;
    border-radius: 10px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.5);
    display: block;
  }

  /* Эфир-канвас: 1376×768 в 688×384 CSS */
  #efir-preview { width: 688px; height: 384px; }

  .fields, .efir-fields {
    display: flex; flex-direction: column; gap: 10px;
    max-width: 640px; margin: 0 auto; width: 100%;
  }

  .field-row { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }

  input[type="text"], input[type="date"], input[type="time"], textarea {
    background: #1a1d27;
    border: 1px solid #2a2f3e;
    border-radius: 8px;
    color: #e8eaf0;
    font-size: 14px;
    padding: 9px 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  input:focus, textarea:focus { border-color: #ff9f43; }
  textarea { resize: vertical; min-height: 90px; line-height: 1.5; }

  button {
    cursor: pointer; border: none; border-radius: 7px;
    font-size: 13px; font-weight: 600; padding: 9px 18px;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-primary { background: #ff9f43; color: #0f1117; }
  .btn-primary:hover:not(:disabled) { opacity: 0.85; }

  .btn-secondary { background: #1e2130; color: #e8eaf0; border: 1px solid #2a2f3e; }
  .btn-secondary:hover:not(:disabled) { background: #252a3a; }

  .btn-ai { background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; }
  .btn-ai:hover:not(:disabled) { opacity: 0.85; }

  .btn-toggle { background: #1e2130; color: #6b7280; border: 1px solid #2a2f3e; }
  .btn-toggle.active { background: #2a3a5e; color: #60a5fa; border-color: #3b82f6; }

  .btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .ai-box {
    background: #1a1d27; border: 1px solid #2a2f3e;
    border-radius: 10px; padding: 14px 16px;
    max-width: 640px; margin: 0 auto; width: 100%;
  }
  .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ai-badge { background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 99px; }
  .ai-title { font-size: 13px; font-weight: 600; color: #c4b5fd; }
  .ai-option { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #9ca3af; margin-bottom: 8px; cursor: pointer; }
  .ai-option input { width: auto; }
  #ai-status { font-size: 12px; color: #a78bfa; margin-top: 6px; min-height: 18px; }

  .action-row { max-width: 640px; margin: 0 auto; width: 100%; }

  .efir-row { display: flex; gap: 10px; }
  .efir-row .field-row { flex: 1; }
  .day-picker { display: flex; gap: 8px; }
  .day-btn { flex: 1; }

  .banner-page { display: flex; flex-direction: column; gap: 18px; width: 100%; }
  .banner-page.hidden { display: none; }
  .efir-page { display: none; flex-direction: column; gap: 18px; width: 100%; }
  .efir-page.visible { display: flex; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid rgba(167,139,250,0.3); border-top-color: #a78bfa;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 5px;
  }

  @media (max-width: 700px) {
    .container { grid-template-columns: 1fr; height: auto; }
    .sidebar { flex-direction: row; overflow-x: auto; overflow-y: visible; border-right: none; border-bottom: 1px solid #1e2130; padding: 8px; height: 72px; }
    .sidebar-label { display: none; }
    .template-card { min-width: 90px; }
    #efir-preview { width: 100%; height: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">DobroPost Banners</div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('banner')">Баннер</button>
    <button class="tab" onclick="switchTab('efir')">Прямой эфир</button>
  </div>
</header>

<div class="container">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-label">Шаблоны</div>
  </div>

  <div class="editor">

    <!-- ══ БАННЕР ══ -->
    <div class="banner-page" id="banner-page">

      <div class="canvas-wrap">
        <canvas id="preview" width="600" height="350"></canvas>
      </div>

      <div class="fields">
        <div class="field-row">
          <div class="field-label">Заголовок</div>
          <input type="text" id="title" placeholder="Например: Находки недели" maxlength="80">
        </div>
        <div class="field-row">
          <div class="field-label">Подзаголовок</div>
          <input type="text" id="subtitle" placeholder="Например: Лучшие товары со скидкой" maxlength="120">
        </div>
      </div>

      <div class="ai-box">
        <div class="ai-header">
          <span class="ai-badge">AI</span>
          <span class="ai-title">Автозаполнение от Claude</span>
        </div>
        <div class="ai-option">
          <input type="checkbox" id="ai-pick-template" checked>
          <label for="ai-pick-template">Выбрать шаблон автоматически</label>
        </div>
        <div class="field-row">
          <textarea id="letter-text" placeholder="Вставьте текст письма или краткое описание..."></textarea>
        </div>
        <div class="btn-row" style="margin-top: 8px;">
          <button class="btn-ai" id="ai-btn" onclick="runAI()">✨ Подобрать</button>
          <div id="ai-status"></div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn-primary" onclick="downloadCanvas('preview', 'banner')">⬇ Скачать PNG</button>
      </div>

    </div>

    <!-- ══ ЭФИР ══ -->
    <div class="efir-page" id="efir-page">

      <div class="canvas-wrap">
        <!-- Канвас 2x: 1376×768 пикселей, отображается как 688×384 -->
        <canvas id="efir-preview" width="1376" height="768"></canvas>
      </div>

      <div class="efir-fields">

        <div class="efir-row">
          <div class="field-row">
            <div class="field-label">Дата</div>
            <input type="date" id="efir-date">
          </div>
          <div class="field-row">
            <div class="field-label">Время (МСК)</div>
            <input type="time" id="efir-time" value="19:00">
          </div>
        </div>

        <div class="field-row">
          <div class="field-label">День</div>
          <div class="day-picker">
            <button class="btn-toggle day-btn active" id="day-today"    onclick="setDay('Сегодня')">Сегодня</button>
            <button class="btn-toggle day-btn"        id="day-tomorrow" onclick="setDay('Завтра')">Завтра</button>
            <button class="btn-toggle day-btn"        id="day-custom"   onclick="setDay('custom')">Своё</button>
          </div>
        </div>

        <div class="field-row" id="custom-day-row" style="display:none;">
          <input type="text" id="efir-day-custom" placeholder="Например: Вторник" maxlength="30">
        </div>

      </div>

      <div class="action-row">
        <button class="btn-primary" onclick="downloadCanvas('efir-preview', 'efir')">⬇ Скачать PNG</button>
      </div>

    </div>

  </div>
</div>

<script>
const TEMPLATE_CONFIG = {
  'nahodki-1':        { textColor: '#1C2B3A' },
  'nahodki-2':        { textColor: '#1C2B3A' },
  'nahodki-3':        { textColor: '#1C2B3A' },
  'nahodki-4':        { textColor: '#1C2B3A' },
  'nahodki-5':        { textColor: '#ffffff' },
  'nahodki-6':        { textColor: '#ffffff' },
  'nahodki-7':        { textColor: '#ffffff' },
  'nahodki-prazdnik': { textColor: '#ffffff' },
  'community-1':      { textColor: '#1C2B3A' },
  'community-2':      { textColor: '#ffffff' },
  'community-3':      { textColor: '#ffffff' },
  'community-4':      { textColor: '#ffffff' },
  'gayd-1':           { textColor: '#ffffff' },
  'prazdnik-1':       { textColor: '#ffffff' },
  'prazdnik-2':       { textColor: '#ffffff' },
  'prazdnik-3':       { textColor: '#ffffff' },
  'novinka-1':        { textColor: '#ffffff' },
  'polezno-1':        { textColor: '#1C2B3A' },
  'akciya-1':         { textColor: '#ffffff' },
  'akciya-2':         { textColor: '#ffffff' },
  'akciya-3':         { textColor: '#1C2B3A' },
  'stil-1':           { textColor: '#1C2B3A' },
};

const TEMPLATE_LABELS = {
  'nahodki-1':'Находки 1','nahodki-2':'Находки 2','nahodki-3':'Находки 3','nahodki-4':'Находки 4',
  'nahodki-5':'Находки 5','nahodki-6':'Находки 6','nahodki-7':'Находки 7','nahodki-prazdnik':'Находки праздник',
  'community-1':'Комьюнити 1','community-2':'Комьюнити 2','community-3':'Комьюнити 3','community-4':'Комьюнити 4',
  'gayd-1':'Гайд','prazdnik-1':'Праздник 1','prazdnik-2':'Праздник 2','prazdnik-3':'Праздник 3',
  'novinka-1':'Новинка','polezno-1':'Полезно','akciya-1':'Акция 1','akciya-2':'Акция 2','akciya-3':'Акция 3','stil-1':'Стиль',
};

const RU_MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

let selectedTemplate = 'nahodki-1';
let efirDay = 'Сегодня';
let currentTab = 'banner';
const imgCache = {};
let interReady = false;

async function loadInterFont() {
  if (interReady) return;
  try {
    const [latin, cyr] = await Promise.all([
      new FontFace('Inter', "url('/fonts/Inter-Black-Latin.woff2')",    { weight: '900', display: 'block' }).load(),
      new FontFace('Inter', "url('/fonts/Inter-Black-Cyrillic.woff2')", { weight: '900', display: 'block' }).load(),
    ]);
    document.fonts.add(latin);
    document.fonts.add(cyr);
    interReady = true;
  } catch (e) {
    console.warn('Inter не загрузился:', e.message);
  }
}

// ── Загрузка изображений ──────────────────────────────────────────
function loadImg(src) {
  if (imgCache[src]) return Promise.resolve(imgCache[src]);
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { imgCache[src] = img; resolve(img); };
    img.onerror = reject;
    img.src = src;
  });
}

// ── Перенос текста ────────────────────────────────────────────────
function wrapText(ctx, text, maxWidth) {
  if (!text) return [];
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = word; }
    else line = test;
  }
  if (line) lines.push(line);
  return lines;
}

// ── Рендер баннера (600×350) ──────────────────────────────────────
async function render() {
  const canvas = document.getElementById('preview');
  const ctx = canvas.getContext('2d');
  const cfg = TEMPLATE_CONFIG[selectedTemplate];
  const title = document.getElementById('title').value;
  const subtitle = document.getElementById('subtitle').value;

  ctx.clearRect(0, 0, 600, 350);

  try {
    const img = await loadImg('/templates/' + selectedTemplate + '.jpg');
    ctx.drawImage(img, 0, 0, 600, 350);
  } catch {
    ctx.fillStyle = '#E77E2F';
    ctx.fillRect(0, 0, 600, 350);
  }

  if (!title && !subtitle) return;

  ctx.textBaseline = 'top';
  ctx.fillStyle = cfg.textColor;

  let y = 80;
  ctx.font = 'bold 36px Arial, Helvetica, sans-serif';
  for (const line of wrapText(ctx, title, 270)) { ctx.fillText(line, 32, y); y += 42; }

  if (subtitle) {
    y += 14;
    ctx.font = '16px Arial, Helvetica, sans-serif';
    ctx.globalAlpha = 0.9;
    for (const line of wrapText(ctx, subtitle, 270)) { ctx.fillText(line, 32, y); y += 24; }
    ctx.globalAlpha = 1;
  }
}

// ── Рендер эфира (2x: 1376×768, отображается 688×384) ────────────
async function renderEfir() {
  const canvas = document.getElementById('efir-preview');
  const ctx = canvas.getContext('2d');
  // Все координаты ×2 относительно оригинального HTML 688×384
  const S = 2;

  ctx.clearRect(0, 0, 1376, 768);

  let hasBg = false;
  try {
    const bg = await loadImg('/templates/efir-blank.png');
    ctx.drawImage(bg, 0, 0, 1376, 768);
    hasBg = true;
  } catch {
    ctx.fillStyle = '#0d1f2e';
    ctx.fillRect(0, 0, 1376, 768);
  }

  const dateVal = document.getElementById('efir-date').value;
  const timeVal = document.getElementById('efir-time').value || '19:00';
  const dayLabel = efirDay === 'custom'
    ? (document.getElementById('efir-day-custom').value || 'Вторник')
    : efirDay;

  // Дата в читаемый вид (с днём недели — как в воркфлоу)
  const RU_DAYS = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  let dateLabel = '';
  if (dateVal) {
    const [yr, m, d] = dateVal.split('-').map(Number);
    const dt = new Date(yr, m - 1, d);
    dateLabel = `${d} ${RU_MONTHS[m - 1]}, ${RU_DAYS[dt.getDay()]}`;
  }

  // Явно загружаем Inter Black (оба файла — латиница и кириллица)
  await loadInterFont();

  const badgeTop  = (hasBg ? 95  : 75)  * S;
  const badgeLeft = 28 * S;
  const textTop   = (hasBg ? 130 : 110) * S;
  const fontSize  = (hasBg ? 46  : 44)  * S;

  const badgeH    = 28 * S;
  const badgePadX = 14 * S;
  const badgeGap  = 8  * S;
  const badgeR    = 20 * S;

  ctx.font = `900 ${12 * S}px Inter, 'Arial Black', Arial, sans-serif`;
  ctx.textBaseline = 'middle';

  function drawBadge(text, x, bgColor, borderColor, textColor) {
    const tw = ctx.measureText(text).width;
    const w = tw + badgePadX * 2;
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(x, badgeTop, w, badgeH, badgeR);
    ctx.fillStyle = bgColor;
    ctx.fill();
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = textColor;
    ctx.fillText(text, x + badgePadX, badgeTop + badgeH / 2);
    ctx.restore();
    return w + badgeGap;
  }

  let bx = badgeLeft;
  if (dateLabel) {
    bx += drawBadge(dateLabel, bx, 'rgba(255,255,255,0.15)', 'rgba(255,255,255,0.3)', '#ffffff');
  }
  drawBadge(timeVal + ' МСК', bx, 'rgba(255,195,58,0.2)', 'rgba(255,195,58,0.5)', '#FFC33A');

  // Основной текст
  ctx.fillStyle = '#ffffff';
  ctx.textBaseline = 'top';
  ctx.font = `900 ${fontSize}px Inter, 'Arial Black', Arial, sans-serif`;

  let ty = textTop;
  for (const line of [`Еженедельный`, `прямой эфир`, `${dayLabel} в ${timeVal}`]) {
    ctx.fillText(line, 28 * S, ty);
    ty += Math.round(fontSize * 1.18);
  }
}

// ── Табы ──────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'banner')));
  document.getElementById('banner-page').classList.toggle('hidden', tab !== 'banner');
  document.getElementById('efir-page').classList.toggle('visible', tab === 'efir');
  document.getElementById('sidebar').style.visibility = tab === 'banner' ? 'visible' : 'hidden';
  if (tab === 'efir') renderEfir();
}

// ── Сайдбар шаблонов ──────────────────────────────────────────────
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  Object.keys(TEMPLATE_CONFIG).forEach(id => {
    const card = document.createElement('div');
    card.className = 'template-card' + (id === selectedTemplate ? ' active' : '');
    card.dataset.id = id;
    card.innerHTML = `<img src="/templates/${id}.jpg" alt="${id}" loading="lazy"><span class="t-name">${TEMPLATE_LABELS[id] || id}</span>`;
    card.addEventListener('click', () => {
      selectedTemplate = id;
      document.querySelectorAll('.template-card').forEach(c => c.classList.toggle('active', c.dataset.id === id));
      render();
    });
    sidebar.appendChild(card);
  });
}

// ── День эфира ────────────────────────────────────────────────────
function setDay(val) {
  efirDay = val;
  document.getElementById('day-today').classList.toggle('active', val === 'Сегодня');
  document.getElementById('day-tomorrow').classList.toggle('active', val === 'Завтра');
  document.getElementById('day-custom').classList.toggle('active', val === 'custom');
  document.getElementById('custom-day-row').style.display = val === 'custom' ? 'block' : 'none';
  renderEfir();
}

// ── AI ────────────────────────────────────────────────────────────
async function runAI() {
  const btn = document.getElementById('ai-btn');
  const status = document.getElementById('ai-status');
  const letterText = document.getElementById('letter-text').value.trim();
  const pickTemplate = document.getElementById('ai-pick-template').checked;

  if (!letterText) { status.textContent = '⚠️ Вставьте текст письма'; return; }

  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span>Анализирую...';

  try {
    const body = { letterText };
    if (!pickTemplate) body.templateId = selectedTemplate;

    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || res.statusText);
    const data = await res.json();

    if (data.title)    document.getElementById('title').value = data.title;
    if (data.subtitle) document.getElementById('subtitle').value = data.subtitle;
    if (data.templateId && pickTemplate && TEMPLATE_CONFIG[data.templateId]) {
      selectedTemplate = data.templateId;
      document.querySelectorAll('.template-card').forEach(c => c.classList.toggle('active', c.dataset.id === data.templateId));
    }
    render();
    status.textContent = '✅ Готово!';
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch (err) {
    status.textContent = '❌ ' + err.message;
  } finally {
    btn.disabled = false;
  }
}

// ── Скачать ───────────────────────────────────────────────────────
function downloadCanvas(canvasId, prefix) {
  const canvas = document.getElementById(canvasId);
  const name = (document.getElementById('title')?.value || prefix).slice(0, 40).replace(/[^\w\sа-яА-ЯёЁ]/g, '').trim() || prefix;
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `${name}.png`;
  a.click();
}

// ── Инициализация ─────────────────────────────────────────────────
(function() {
  const today = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('efir-date').value =
    `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;
})();

document.getElementById('title').addEventListener('input', render);
