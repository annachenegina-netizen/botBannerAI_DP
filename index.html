<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Generator — DobroPost</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #0f1117;
    color: #e8eaf0;
    min-height: 100vh;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid #1e2130;
    display: flex;
    align-items: center;
    gap: 12px;
    background: #13161e;
  }

  header .logo {
    font-size: 20px;
    font-weight: 700;
    color: #ff9f43;
  }

  header .subtitle {
    font-size: 13px;
    color: #6b7280;
  }

  .container {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 0;
    height: calc(100vh - 57px);
  }

  /* ── Левая панель: шаблоны ── */
  .sidebar {
    background: #13161e;
    border-right: 1px solid #1e2130;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    color: #4b5563;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 4px 4px 8px;
  }

  .template-card {
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
    position: relative;
  }

  .template-card:hover {
    border-color: #ff9f43;
    transform: translateY(-1px);
  }

  .template-card.active {
    border-color: #ff9f43;
    box-shadow: 0 0 0 1px #ff9f43;
  }

  .template-card img {
    width: 100%;
    height: 57px;
    object-fit: cover;
    display: block;
  }

  .template-card .t-name {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.55);
    font-size: 10px;
    color: #fff;
    padding: 3px 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Правая панель: редактор ── */
  .editor {
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 24px;
    gap: 20px;
  }

  .canvas-wrap {
    display: flex;
    justify-content: center;
  }

  .canvas-wrap canvas {
    max-width: 100%;
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: block;
  }

  /* ── Поля ввода ── */
  .fields {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
  }

  .field-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  input[type="text"], textarea {
    background: #1a1d27;
    border: 1px solid #2a2f3e;
    border-radius: 8px;
    color: #e8eaf0;
    font-size: 14px;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  input[type="text"]:focus, textarea:focus {
    border-color: #ff9f43;
  }

  textarea {
    resize: vertical;
    min-height: 100px;
    line-height: 1.5;
  }

  /* ── Кнопки ── */
  .btn-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
  }

  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-primary {
    background: #ff9f43;
    color: #0f1117;
  }

  .btn-primary:hover:not(:disabled) { opacity: 0.88; }

  .btn-secondary {
    background: #1e2130;
    color: #e8eaf0;
    border: 1px solid #2a2f3e;
  }

  .btn-secondary:hover:not(:disabled) { background: #252a3a; }

  .btn-ai {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: #fff;
  }

  .btn-ai:hover:not(:disabled) { opacity: 0.88; }

  /* ── AI секция ── */
  .ai-section {
    background: #1a1d27;
    border: 1px solid #2a2f3e;
    border-radius: 10px;
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
  }

  .ai-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .ai-badge {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 99px;
    letter-spacing: 0.5px;
  }

  .ai-title {
    font-size: 13px;
    font-weight: 600;
    color: #c4b5fd;
  }

  .ai-desc {
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 10px;
  }

  .ai-option {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #9ca3af;
    margin-bottom: 10px;
    cursor: pointer;
  }

  .ai-option input[type="checkbox"] {
    width: auto;
    cursor: pointer;
  }

  #ai-status {
    font-size: 13px;
    color: #a78bfa;
    margin-top: 8px;
    min-height: 20px;
  }

  /* ── Download ── */
  .download-section {
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(167,139,250,0.3);
    border-top-color: #a78bfa;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @media (max-width: 700px) {
    .container { grid-template-columns: 1fr; height: auto; }
    .sidebar { flex-direction: row; overflow-x: auto; overflow-y: visible; border-right: none; border-bottom: 1px solid #1e2130; padding: 10px; height: 80px; }
    .sidebar-label { display: none; }
    .template-card { min-width: 100px; flex-shrink: 0; }
    .template-card img { height: 58px; }
    .editor { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">DobroPost</div>
  <div class="subtitle">Генератор баннеров</div>
</header>

<div class="container">
  <!-- Панель шаблонов -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-label">Шаблоны</div>
    <!-- Вставляется JS -->
  </div>

  <!-- Редактор -->
  <div class="editor">

    <!-- Превью -->
    <div class="canvas-wrap">
      <canvas id="preview" width="600" height="350"></canvas>
    </div>

    <!-- Поля ввода -->
    <div class="fields">
      <div class="field-row">
        <div class="field-label">Заголовок</div>
        <input type="text" id="title" placeholder="Например: Находки недели" maxlength="80">
      </div>
      <div class="field-row">
        <div class="field-label">Подзаголовок</div>
        <input type="text" id="subtitle" placeholder="Например: Лучшие товары со скидкой" maxlength="120">
      </div>
    </div>

    <!-- AI секция -->
    <div class="ai-section">
      <div class="ai-header">
        <span class="ai-badge">AI</span>
        <span class="ai-title">Автозаполнение от Claude</span>
      </div>
      <div class="ai-desc">Вставьте текст письма — AI подберёт заголовок и подзаголовок</div>

      <label class="ai-option">
        <input type="checkbox" id="ai-pick-template" checked>
        Также выбрать шаблон автоматически
      </label>

      <div class="field-row">
        <textarea id="letter-text" placeholder="Вставьте текст письма или краткое описание темы..."></textarea>
      </div>

      <div class="btn-row" style="margin-top: 10px;">
        <button class="btn-ai" id="ai-btn" onclick="runAI()">✨ Подобрать</button>
        <div id="ai-status"></div>
      </div>
    </div>

    <!-- Скачать -->
    <div class="download-section">
      <div class="btn-row">
        <button class="btn-primary" onclick="download()">⬇ Скачать PNG</button>
        <button class="btn-secondary" onclick="copyToClipboard()">📋 Скопировать</button>
      </div>
    </div>

  </div><!-- /editor -->
</div><!-- /container -->

<script>
// ── Конфиг шаблонов ──────────────────────────────────────────────
const TEMPLATE_CONFIG = {
  'nahodki-1':        { bgColor: '#FFC33A', textColor: '#1C2B3A' },
  'nahodki-2':        { bgColor: '#FFC33A', textColor: '#1C2B3A' },
  'nahodki-3':        { bgColor: '#FFC33A', textColor: '#1C2B3A' },
  'nahodki-4':        { bgColor: '#FFC33A', textColor: '#1C2B3A' },
  'nahodki-5':        { bgColor: '#E77E2F', textColor: '#ffffff' },
  'nahodki-6':        { bgColor: '#E77E2F', textColor: '#ffffff' },
  'nahodki-7':        { bgColor: '#E77E2F', textColor: '#ffffff' },
  'nahodki-prazdnik': { bgColor: '#E77E2F', textColor: '#ffffff' },
  'community-1':      { bgColor: '#FFC33A', textColor: '#1C2B3A' },
  'community-2':      { bgColor: '#E77E2F', textColor: '#ffffff' },
  'community-3':      { bgColor: '#E77E2F', textColor: '#ffffff' },
  'community-4':      { bgColor: '#E77E2F', textColor: '#ffffff' },
  'gayd-1':           { bgColor: '#E77E2F', textColor: '#ffffff' },
  'prazdnik-1':       { bgColor: '#E77E2F', textColor: '#ffffff' },
  'prazdnik-2':       { bgColor: '#E77E2F', textColor: '#ffffff' },
  'prazdnik-3':       { bgColor: '#E77E2F', textColor: '#ffffff' },
  'novinka-1':        { bgColor: '#1C2B3A', textColor: '#ffffff' },
  'polezno-1':        { bgColor: '#FFC33A', textColor: '#1C2B3A' },
  'akciya-1':         { bgColor: '#E77E2F', textColor: '#ffffff' },
  'akciya-2':         { bgColor: '#E77E2F', textColor: '#ffffff' },
  'akciya-3':         { bgColor: '#FFC33A', textColor: '#1C2B3A' },
  'stil-1':           { bgColor: '#f5f0eb', textColor: '#1C2B3A' },
};

const TEMPLATE_IDS = Object.keys(TEMPLATE_CONFIG);

const TEMPLATE_LABELS = {
  'nahodki-1': 'Находки 1',
  'nahodki-2': 'Находки 2',
  'nahodki-3': 'Находки 3',
  'nahodki-4': 'Находки 4',
  'nahodki-5': 'Находки 5',
  'nahodki-6': 'Находки 6',
  'nahodki-7': 'Находки 7',
  'nahodki-prazdnik': 'Находки праздник',
  'community-1': 'Комьюнити 1',
  'community-2': 'Комьюнити 2',
  'community-3': 'Комьюнити 3',
  'community-4': 'Комьюнити 4',
  'gayd-1': 'Гайд',
  'prazdnik-1': 'Праздник 1',
  'prazdnik-2': 'Праздник 2',
  'prazdnik-3': 'Праздник 3',
  'novinka-1': 'Новинка',
  'polezno-1': 'Полезно',
  'akciya-1': 'Акция 1',
  'akciya-2': 'Акция 2',
  'akciya-3': 'Акция 3',
  'stil-1': 'Стиль',
};

// ── Состояние ─────────────────────────────────────────────────────
let selectedTemplate = TEMPLATE_IDS[0];
const imgCache = {};

// ── Рендер боковой панели ─────────────────────────────────────────
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  const label = sidebar.querySelector('.sidebar-label');
  TEMPLATE_IDS.forEach(id => {
    const card = document.createElement('div');
    card.className = 'template-card' + (id === selectedTemplate ? ' active' : '');
    card.dataset.id = id;
    card.innerHTML = `<img src="/templates/${id}.jpg" alt="${id}" loading="lazy"><span class="t-name">${TEMPLATE_LABELS[id] || id}</span>`;
    card.addEventListener('click', () => selectTemplate(id));
    sidebar.appendChild(card);
  });
}

function selectTemplate(id) {
  selectedTemplate = id;
  document.querySelectorAll('.template-card').forEach(c => c.classList.toggle('active', c.dataset.id === id));
  render();
}

// ── Загрузка изображения ──────────────────────────────────────────
function loadImg(src) {
  if (imgCache[src]) return Promise.resolve(imgCache[src]);
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { imgCache[src] = img; resolve(img); };
    img.onerror = reject;
    img.src = src;
  });
}

// ── Перенос текста ────────────────────────────────────────────────
function wrapText(ctx, text, maxWidth) {
  if (!text) return [];
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

// ── Отрисовка баннера на canvas ───────────────────────────────────
async function render() {
  const canvas = document.getElementById('preview');
  const ctx = canvas.getContext('2d');
  const cfg = TEMPLATE_CONFIG[selectedTemplate];
  const title = document.getElementById('title').value;
  const subtitle = document.getElementById('subtitle').value;

  ctx.clearRect(0, 0, 600, 350);

  // Фон
  try {
    const img = await loadImg(`/templates/${selectedTemplate}.jpg`);
    ctx.drawImage(img, 0, 0, 600, 350);
  } catch {
    ctx.fillStyle = cfg.bgColor;
    ctx.fillRect(0, 0, 600, 350);
  }

  // Текст
  ctx.textBaseline = 'top';
  ctx.fillStyle = cfg.textColor;

  let y = 80;

  // Заголовок
  ctx.font = '800 36px Arial, Helvetica, sans-serif';
  const titleLines = wrapText(ctx, title || '', 268);
  for (const line of titleLines) {
    ctx.fillText(line, 32, y);
    y += Math.round(36 * 1.15);
  }

  y += 14; // gap

  // Подзаголовок
  ctx.font = '500 16px Arial, Helvetica, sans-serif';
  ctx.globalAlpha = 0.9;
  const subLines = wrapText(ctx, subtitle || '', 268);
  for (const line of subLines) {
    ctx.fillText(line, 32, y);
    y += Math.round(16 * 1.45);
  }
  ctx.globalAlpha = 1;
}

// ── AI ────────────────────────────────────────────────────────────
async function runAI() {
  const btn = document.getElementById('ai-btn');
  const status = document.getElementById('ai-status');
  const letterText = document.getElementById('letter-text').value.trim();
  const pickTemplate = document.getElementById('ai-pick-template').checked;

  if (!letterText) {
    status.textContent = '⚠️ Вставьте текст письма';
    return;
  }

  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span>Анализирую...';

  try {
    const body = { letterText };
    if (!pickTemplate) body.templateId = selectedTemplate;

    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || 'Ошибка сервера');
    }

    const data = await res.json();

    if (data.title) document.getElementById('title').value = data.title;
    if (data.subtitle) document.getElementById('subtitle').value = data.subtitle;
    if (data.templateId && pickTemplate && TEMPLATE_CONFIG[data.templateId]) {
      selectTemplate(data.templateId);
    } else {
      render();
    }

    status.textContent = '✅ Готово!';
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch (err) {
    status.textContent = '❌ ' + err.message;
  } finally {
    btn.disabled = false;
  }
}

// ── Скачать PNG ───────────────────────────────────────────────────
function download() {
  const canvas = document.getElementById('preview');
  const name = (document.getElementById('title').value || selectedTemplate).slice(0, 40).replace(/[^\w\sа-яА-ЯёЁ]/g, '').trim() || 'banner';
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `${name}.png`;
  a.click();
}

// ── Скопировать в буфер ───────────────────────────────────────────
async function copyToClipboard() {
  const canvas = document.getElementById('preview');
  try {
    canvas.toBlob(async blob => {
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      const btn = event.target;
      const orig = btn.textContent;
      btn.textContent = '✅ Скопировано!';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    });
  } catch {
    alert('Браузер не поддерживает копирование. Скачайте PNG.');
  }
}

// ── Реакция на изменения полей ────────────────────────────────────
document.getElementById('title').addEventListener('input', () => render());
document.getElementById('subtitle').addEventListener('input', () => render());

// ── Инициализация ─────────────────────────────────────────────────
buildSidebar();
render();
</script>
</body>
</html>
